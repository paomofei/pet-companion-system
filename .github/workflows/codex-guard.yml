name: codex-guard

on:
  pull_request:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"
  push:
    branches: [main, master]
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "AGENTS.md"

concurrency:
  group: codex-guard-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: lint-typecheck-test-build
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run mandatory verification stack
        run: bash scripts/mandatory-verification.sh full
